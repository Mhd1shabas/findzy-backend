<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - FINDZY</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <h1 class="logo">FINDZY</h1>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="login.html">Login</a></li>
                    <li><a href="register.html">Register</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="auth-section">
            <div class="container">
                <div class="auth-form">
                    <h2>Register for FINDZY</h2>
                    <form id="register-form">
                        <div class="form-group">
                            <label for="name">Full Name</label>
                            <input type="text" id="name" name="name" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" required>
                        </div>
                        <div class="form-group">
                            <label for="phone">Phone (optional)</label>
                            <input type="tel" id="phone" name="phone">
                        </div>
                        <div class="form-group">
                            <label for="password">Password</label>
                            <input type="password" id="password" name="password" required>
                        </div>
                        <div class="form-group">
                            <label for="role">I am a:</label>
                            <select id="role" name="role" required>
                                <option value="user">Student (looking for services)</option>
                                <option value="provider">Service Provider</option>
                            </select>
                        </div>
                        <div class="form-group" id="university-group">
                            <label for="university">University</label>
                            <input type="text" id="university" name="university">
                        </div>
                        <button type="submit" class="btn-primary">Register</button>
                    </form>
                    <p class="auth-link">Already have an account? <a href="login.html">Login here</a></p>
                    <div id="message"></div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 FINDZY. All rights reserved.</p>
    </footer>

    <script src="js/auth.js"></script>
</body>
</html>
