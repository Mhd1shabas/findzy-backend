<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Service - FINDZY</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <nav>
            <div class="nav-container">
                <h1 class="logo">FINDZY</h1>
                <ul class="nav-links">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="services.html">Services</a></li>
                    <li><a href="login.html" id="login-link">Login</a></li>
                    <li><a href="register.html" id="register-link">Register</a></li>
                    <li><a href="#" id="logout-link" style="display: none;">Logout</a></li>
                </ul>
            </div>
        </nav>
    </header>

    <main>
        <section class="booking-section">
            <div class="container">
                <div class="booking-form">
                    <h2>Book a Service</h2>
                    <form id="booking-form">
                        <div class="form-group">
                            <label for="service-id">Service ID</label>
                            <input type="text" id="service-id" name="serviceId" required placeholder="Enter service ID from services page">
                        </div>
                        <div class="form-group">
                            <label for="title">Request Title</label>
                            <input type="text" id="title" name="title" required placeholder="Brief title for your request">
                        </div>
                        <div class="form-group">
                            <label for="description">Description</label>
                            <textarea id="description" name="description" required placeholder="Describe what you need..."></textarea>
                        </div>
                        <div class="form-group">
                            <label for="preferred-date">Preferred Date</label>
                            <input type="date" id="preferred-date" name="preferredDate">
                        </div>
                        <div class="form-group">
                            <label for="preferred-time">Preferred Time</label>
                            <input type="time" id="preferred-time" name="preferredTime">
                        </div>
                        <div class="form-group">
                            <label for="duration">Duration</label>
                            <input type="text" id="duration" name="duration" placeholder="e.g., 1 hour">
                        </div>
                        <div class="form-group">
                            <label for="location">Location</label>
                            <input type="text" id="location" name="location" placeholder="Online or physical location">
                        </div>
                        <div class="form-group">
                            <label for="contact-method">Preferred Contact Method</label>
                            <select id="contact-method" name="contactMethod">
                                <option value="whatsapp">WhatsApp</option>
                                <option value="email">Email</option>
                                <option value="phone">Phone</option>
                            </select>
                        </div>
                        <button type="submit" class="btn-primary">Send Request</button>
                    </form>
                    <div id="message"></div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 FINDZY. All rights reserved.</p>
    </footer>

    <script src="js/auth.js"></script>
    <script src="js/booking.js"></script>
</body>
</html>
